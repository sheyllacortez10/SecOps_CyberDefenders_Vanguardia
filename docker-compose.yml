version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: secops_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secops_academy
    ports:
      # Mapeo al puerto 5433 en host para evitar conflictos con PostgreSQL local
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: secops_backend
    restart: always
    ports:
      - "3000:3000"
    # Carga de variables desde el .env del backend para evitar duplicación
    env_file:
      - ./backend/.env
    environment:
      # Sobrescritura del host de BD para la red interna de Docker
      - DB_HOST=db
    depends_on:
      - db
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build: ./frontend
    container_name: secops_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  pgdata:
    driver: local
