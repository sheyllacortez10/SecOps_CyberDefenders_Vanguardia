apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: secops-academy
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: sheyllacortez10/secops-frontend:latest
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: secops-academy
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 5173
      protocol: TCP
  selector:
    app: frontend

