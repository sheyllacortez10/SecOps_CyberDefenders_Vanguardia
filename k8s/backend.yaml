apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: secops-academy
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: sheyllacortez10/secops-backend:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_USER
              value: "postgres"
            - name: DB_PASSWORD
              value: "postgres"
            - name: DB_HOST
              value: "db"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "secops_academy"
            - name: JWT_SECRET
              value: "supersecurejwtsecretkey123!"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: secops-academy
spec:
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: backend
