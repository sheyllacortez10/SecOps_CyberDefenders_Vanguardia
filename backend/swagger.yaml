    ActivityCreateRequest:
      type: object
      required: [type, question, validationStrategy, correctAnswer]
      properties:
        type:
          type: string
          enum: [multiple_choice, line_selection, fill_in, order_steps]
          example: "multiple_choice"
        question:
          type: string
          example: "¿Qué función usarías para sanitizar la salida en el navegador?"
        options:
          type: array
          items:
            type: string
          example:
            - "innerHTML"
            - "textContent"
            - "outerHTML"
            - "document.write"
        correctAnswer:
          description: Respuesta o respuestas correctas para la validación.
          oneOf:
            - type: string
              example: "textContent"
            - type: array
              items:
                type: string
        validationStrategy:
          type: string
          enum: [exact_match, keyword_match, predefined_list]
          example: "exact_match"
        explanation:
          type: string
          example: "textContent es seguro porque no interpreta HTML, evitando la ejecución de scripts."

